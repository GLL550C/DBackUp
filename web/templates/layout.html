<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库备份工具 - {{.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-brand">
                <i class="bi bi-shield-check"></i>
                <span>数据库备份工具</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item" data-page="/">
                    <i class="bi bi-speedometer2"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/connections" class="nav-item" data-page="/connections">
                    <i class="bi bi-plug"></i>
                    <span>数据库连接</span>
                </a>
                <a href="/tasks" class="nav-item" data-page="/tasks">
                    <i class="bi bi-clock"></i>
                    <span>备份任务</span>
                </a>
                <a href="/history" class="nav-item" data-page="/history">
                    <i class="bi bi-archive"></i>
                    <span>备份历史</span>
                </a>
                <a href="/settings" class="nav-item" data-page="/settings">
                    <i class="bi bi-sliders"></i>
                    <span>系统设置</span>
                </a>
                <div style="flex:1;"></div>
                <a href="#" class="nav-item" onclick="doLogout();return false;" style="border-top:1px solid rgba(255,255,255,.06);margin-top:8px;padding-top:14px;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>退出登录</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main id="main-content">
            <header class="topbar">
                <h2>{{.title}}</h2>
            </header>
            <div class="page-content">
                {{.contentHTML}}
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
