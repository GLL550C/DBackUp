<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库备份工具 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --color-primary: #4f6ef7; --color-bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--color-bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #fff; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.1); padding: 44px 36px; width: 400px; max-width: 92vw; }
        .login-box .icon-wrap { width: 56px; height: 56px; border-radius: 14px; background: #eef1ff; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; color: var(--color-primary); }
        .login-box h2 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 4px; }
        .login-box .sub { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
        .field { margin-bottom: 14px; }
        .field input { width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: .2s; }
        .field input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px rgba(79,110,247,.1); }
        .btn-login { width: 100%; padding: 11px; background: var(--color-primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: .2s; }
        .btn-login:hover { background: #3d5ce5; }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; }
        .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; color: #dc2626; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .error-box.show { display: block; animation: shake .4s; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-4px); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon-wrap"><i class="bi bi-shield-lock"></i></div>
        <h2>数据库备份工具</h2>
        <p class="sub">请输入密码以继续</p>
        <form onsubmit="handleLogin(event)">
            <div class="field">
                <input type="password" id="pwd" placeholder="请输入密码" required autofocus autocomplete="off">
            </div>
            <button type="submit" class="btn-login" id="btn">登 录</button>
            <div class="error-box" id="err"></div>
        </form>
    </div>
    <script>
    async function handleLogin(e) {
        e.preventDefault();
        var btn = document.getElementById('btn');
        var err = document.getElementById('err');
        btn.disabled = true;
        btn.textContent = '登录中...';
        err.classList.remove('show');

        try {
            var res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: document.getElementById('pwd').value })
            });
            var data = await res.json();
            if (res.ok) {
                window.location.href = '/';
            } else {
                err.textContent = data.error || '登录失败，请重试';
                err.classList.add('show');
                document.getElementById('pwd').value = '';
                document.getElementById('pwd').focus();
            }
        } catch (ex) {
            err.textContent = '网络错误，无法连接到服务器';
            err.classList.add('show');
        } finally {
            btn.disabled = false;
            btn.textContent = '登 录';
        }
    }
    </script>
</body>
</html>
