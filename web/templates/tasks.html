{{define "tasks_content"}}
<div class="card">
    <div class="card-header">
        <h3>备份任务列表</h3>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="showTaskModal()"><i class="bi bi-plus-lg"></i> 新建任务</button>
            <button class="btn btn-danger btn-sm" id="btn-batch-del-task" style="display:none;" onclick="batchDeleteTasks()"><i class="bi bi-trash"></i> 删除选中</button>
        </div>
    </div>
    <div class="card-body">
        <table class="table">
            <thead>
                <tr><th style="width:40px;"><input type="checkbox" id="select-all-task" onchange="toggleSelectAllTask()"></th><th>任务名称</th><th>存储配置</th><th>定时规则</th><th>保留数量</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="tasks-table"></tbody>
        </table>
        <div id="tasks-empty" class="empty-state">暂无备份任务</div>
    </div>
</div>

<!-- 任务弹窗 -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="taskModalTitle">新建备份任务</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>任务名称 <span class="required">*</span></label>
                        <input type="text" class="form-control" id="task-name" placeholder="例如：每日MySQL备份">
                    </div>
                    <div class="form-group flex-1">
                        <label>数据库连接 <span class="required">*</span></label>
                        <select class="form-select select-glow" id="task-conn" onchange="onTaskConnChange()"></select>
                    </div>
                </div>

                <hr><h6>备份数据库选择</h6>
                <div class="form-group">
                    <label>
                        <input type="radio" name="db-mode" value="all" checked onchange="toggleDBMode()"> 备份全部数据库
                    </label>
                    &nbsp;&nbsp;
                    <label>
                        <input type="radio" name="db-mode" value="select" onchange="toggleDBMode()"> 指定数据库
                    </label>
                </div>
                <div class="form-row" id="db-select-area" style="display:none;">
                    <div class="form-group flex-1">
                        <label>选择数据库</label>
                        <div id="db-checkboxes" style="max-height:150px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;"></div>
                        <small id="db-loading" style="display:none;">加载中...</small>
                        <small id="db-error" style="display:none;color:#ef4444;"></small>
                    </div>
                </div>

                <hr><h6>存储配置</h6>
                <div class="form-group">
                    <label>备份存储方式</label>
                    <select class="form-select select-glow" id="task-storage-type" onchange="toggleStorageFields()">
                        <option value="local">仅本地备份</option>
                        <option value="remote">仅远程备份 (SFTP)</option>
                        <option value="both">本地 + 远程备份</option>
                    </select>
                </div>
                <div class="form-group" id="local-path-group">
                    <label>本地备份目录</label>
                    <input type="text" class="form-control" id="task-local-path" placeholder="留空使用默认目录">
                </div>
                <div id="remote-fields" style="display:none;">
                    <div class="form-row">
                        <div class="form-group flex-3"><label>远程主机</label><input type="text" class="form-control" id="task-remote-host" placeholder="192.168.1.100"></div>
                        <div class="form-group flex-1"><label>端口</label><input type="number" class="form-control" id="task-remote-port" value="22"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group flex-1"><label>用户名</label><input type="text" class="form-control" id="task-remote-user"></div>
                        <div class="form-group flex-1"><label>密码（免密可不填）</label><input type="password" class="form-control" id="task-remote-pass"></div>
                    </div>
                    <div class="form-group"><label>SSH 密钥路径（免密登录）</label><input type="text" class="form-control" id="task-remote-key" placeholder="/home/user/.ssh/id_rsa"><small>填写密钥路径后优先使用密钥认证，密码和密钥至少填一个</small></div>
                    <div class="form-group"><label>远程备份路径</label><input type="text" class="form-control" id="task-remote-path" placeholder="/data/backups"><small>远程服务器上的目录路径，必须以 / 开头</small></div>
                </div>

                <hr><h6>定时与保留策略</h6>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Cron 表达式</label>
                        <input type="text" class="form-control" id="task-cron" placeholder="0 2 * * *">
                        <small><a href="#" onclick="setCronPreset('0 */6 * * *');return false;">每6小时</a> | <a href="#" onclick="setCronPreset('0 2 * * *');return false;">每天凌晨2点</a> | <a href="#" onclick="setCronPreset('0 3 * * 0');return false;">每周日凌晨3点</a></small>
                    </div>
                    <div class="form-group flex-1">
                        <label>保留备份数量</label>
                        <input type="number" class="form-control" id="task-max" value="10" min="1">
                        <small>保留最近 N 份备份</small>
                    </div>
                </div>

                <hr><h6>备份参数（可选）</h6>
                <div id="backup-params-area">
                    <small style="color:#64748b;">选择数据库类型后可配置备份参数</small>
                </div>

                <div class="form-group" style="margin-top:12px;">
                    <label class="switch-label">
                        <input type="checkbox" id="task-enabled" checked>
                        <span>启用定时备份</span>
                    </label>
                </div>
                <input type="hidden" id="task-id">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-save-task">保存任务</button>
            </div>
        </div>
    </div>
</div>
{{end}}
